<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <linearGradient id="cubeTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeLeft2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeRight2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D3D3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cube icon -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#cubeTop2)"/>
  <polygon points="12,24 40,40 40,64 12,48" fill="url(#cubeLeft2)"/>
  <polygon points="40,40 68,24 68,48 40,64" fill="url(#cubeRight2)"/>

  <!-- Risk triangle on top face -->
  <polygon points="40,14 52,34 28,34" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>
  <line x1="40" y1="19" x2="40" y2="27" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="40" cy="30.5" r="1.2" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <!-- IDR in bold -->
  <text x="88" y="34" font-family="'Georgia', 'Times New Roman', serif" font-weight="700" font-size="28" fill="#1A1A1A" letter-spacing="3">IDR</text>
  <!-- Accent line -->
  <rect x="88" y="40" width="62" height="2" fill="#FF6B1A"/>
  <!-- Full name -->
  <text x="88" y="57" font-family="'Georgia', 'Times New Roman', serif" font-size="11" fill="#444444" letter-spacing="1.5">INSTITUTE OF DIGITAL RISK</text>
</svg>
